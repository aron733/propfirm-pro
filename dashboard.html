<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PropfirmPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            padding-top: 80px;
            min-height: 100vh;
            background: #0a0e27;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card .label {
            color: #a0a5c0;
            margin-top: 5px;
        }

        .trading-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .trade-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .trade-form input, .trade-form select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 10px;
            color: white;
        }

        .trade-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-buy {
            background: #00c853;
            flex: 1;
        }

        .btn-sell {
            background: #d50000;
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            color: #667eea;
        }

        .profit-positive {
            color: #00c853;
        }

        .profit-negative {
            color: #d50000;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h2>🚀 Propfirm<span class="highlight">Pro</span></h2>
            </div>
            <div class="nav-menu">
                <a href="index.html">Accueil</a>
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="pricing.html">Tarifs</a>
            </div>
            <div class="nav-auth">
                <span id="userNameDisplay" style="margin-right: 15px;"></span>
                <button onclick="logout()" class="btn-outline">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="container">
            <h1 id="welcomeMessage" style="margin-top: 40px; margin-bottom: 30px;"></h1>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value" id="balanceDisplay">0 €</div>
                    <div class="label">💰 Solde</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="profitDisplay">0 €</div>
                    <div class="label">📈 Profit total</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="tradesCount">0</div>
                    <div class="label">📊 Trades</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="winRateDisplay">0%</div>
                    <div class="label">🎯 Taux réussite</div>
                </div>
            </div>

            <div class="trading-panel">
                <h3>⚡ Passer un trade</h3>
                <div class="trade-form">
                    <select id="assetSelect">
                        <option value="EUR/USD">EUR/USD - €1.0925</option>
                        <option value="GBP/USD">GBP/USD - €1.2645</option>
                        <option value="BTC/USD">BTC/USD - $43,250</option>
                        <option value="AAPL">AAPL - $175.50</option>
                    </select>
                    <input type="number" id="tradeAmount" placeholder="Montant (€)" value="100">
                    <select id="leverageSelect">
                        <option value="1">Levier 1:1</option>
                        <option value="5">Levier 1:5</option>
                        <option value="10">Levier 1:10</option>
                    </select>
                </div>
                <div class="trade-buttons">
                    <button class="btn-primary btn-buy" onclick="executeTrade('buy')">📈 ACHAT</button>
                    <button class="btn-primary btn-sell" onclick="executeTrade('sell')">📉 VENTE</button>
                </div>
                <div id="tradeAlert"></div>
            </div>

            <div class="trading-panel">
                <h3>📋 Historique des trades</h3>
                <table>
                    <thead>
                        <tr><th>Date</th><th>Actif</th><th>Type</th><th>Montant</th><th>Profit</th></tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="5" style="text-align:center;">Aucun trade pour le moment</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentUser = Utils.getCurrentUser();
        
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        let currentPrices = {
            'EUR/USD': 1.0925,
            'GBP/USD': 1.2645,
            'BTC/USD': 43250,
            'AAPL': 175.50
        };

        function updateUI() {
            document.getElementById('welcomeMessage').innerHTML = `Bienvenue, ${currentUser.fullName} ! 👋`;
            document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.fullName.split(' ')[0]}`;
            document.getElementById('balanceDisplay').innerHTML = `${currentUser.balance.toFixed(2)} €`;
            document.getElementById('profitDisplay').innerHTML = `${currentUser.totalProfit.toFixed(2)} €`;
            document.getElementById('tradesCount').innerHTML = currentUser.trades.length;
            
            const winRate = currentUser.trades.length > 0 
                ? (currentUser.trades.filter(t => t.profit > 0).length / currentUser.trades.length * 100).toFixed(1)
                : 0;
            document.getElementById('winRateDisplay').innerHTML = `${winRate}%`;
            
            updateHistoryTable();
        }

        function updateHistoryTable() {
            const tbody = document.getElementById('historyBody');
            if (!currentUser.trades || currentUser.trades.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Aucun trade pour le moment</td></tr>';
                return;
            }
            
            tbody.innerHTML = currentUser.trades.slice(0, 10).map(trade => `
                <tr>
                    <td>${new Date(trade.date).toLocaleString()}</td>
                    <td>${trade.asset}</td>
                    <td style="color: ${trade.type === 'buy' ? '#00c853' : '#d50000'}">${trade.type === 'buy' ? 'ACHAT' : 'VENTE'}</td>
                    <td>${trade.amount}€</td>
                    <td class="${trade.profit >= 0 ? 'profit-positive' : 'profit-negative'}">${trade.profit.toFixed(2)}€</td>
                </tr>
            `).join('');
        }

        function executeTrade(type) {
            const asset = document.getElementById('assetSelect').value;
            const amount = parseFloat(document.getElementById('tradeAmount').value);
            const leverage = parseInt(document.getElementById('leverageSelect').value);
            const currentPrice = currentPrices[asset];
            
            if (isNaN(amount) || amount <= 0) {
                showTradeAlert('Montant invalide', 'error');
                return;
            }
            
            if (amount > currentUser.balance) {
                showTradeAlert('Solde insuffisant', 'error');
                return;
            }
            
            // Simuler un trade avec profit/perte
            const profit = (Math.random() - 0.4) * amount * leverage * 0.5;
            
            currentUser.balance -= amount;
            currentUser.balance += amount + profit;
            currentUser.totalProfit += profit;
            
            if (!currentUser.trades) currentUser.trades = [];
            currentUser.trades.unshift({
                id: Date.now(),
                asset: asset,
                type: type,
                amount: amount,
                leverage: leverage,
                profit: profit,
                entryPrice: currentPrice,
                date: new Date().toISOString()
            });
            
            Utils.setCurrentUser(currentUser);
            updateUI();
            showTradeAlert(`Trade exécuté ! Profit: ${profit.toFixed(2)}€`, profit >= 0 ? 'success' : 'error');
        }

        function showTradeAlert(message, type) {
            const alertDiv = document.getElementById('tradeAlert');
            alertDiv.innerHTML = `<div style="padding:12px; border-radius:8px; margin-top:15px; background:${type === 'success' ? 'rgba(0,255,0,0.1); border:1px solid #0f0; color:#0f0' : 'rgba(255,0,0,0.1); border:1px solid #f00; color:#f00'}">${message}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 3000);
        }

        function logout() {
            localStorage.removeItem('propfirm_current_user');
            window.location.href = 'login.html';
        }

        updateUI();
    </script>
</body>
</html>
